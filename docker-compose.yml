services:

  # ── 1. React 화면 (Nginx) ──────────────────────────────────────
  frontend:
    build:
      context: ./services/frontend
      args:
        VITE_MEMBER_ONE_USERNAME: ${VITE_MEMBER_ONE_USERNAME}
    ports:
      - "8080:80"
    depends_on:
      - portfolio-api

  # ── 2. Java 메인 API (Spring Boot) ────────────────────────────
  portfolio-api:
    build: ./services/portfolio-api
    ports:
      - "8081:8080"
    environment:
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - SPRING_REDIS_HOST=${SPRING_REDIS_HOST}
      - SPRING_REDIS_PORT=${SPRING_REDIS_PORT}
      - JPA_DDL_AUTO=validate
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - MEMBER_ONE_USERNAME=${MEMBER_ONE_USERNAME}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_APP_PASSWORD=${MAIL_APP_PASSWORD}
      - FRONTEND_URL=${FRONTEND_URL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - KAKAO_CLIENT_ID=${KAKAO_CLIENT_ID}
      - KAKAO_CLIENT_SECRET=${KAKAO_CLIENT_SECRET}
      - KAKAO_REDIRECT_URI=${KAKAO_REDIRECT_URI}
      - NAVER_CLIENT_ID=${NAVER_CLIENT_ID}
      - NAVER_CLIENT_SECRET=${NAVER_CLIENT_SECRET}
      - NAVER_REDIRECT_URI=${NAVER_REDIRECT_URI}
    depends_on:
      - postgres
      - redis

  # ── 3. Python 데이터 서비스 ────────────────────────────────────
  data-service:
    build: ./services/data-service
    ports:
      - "8082:8080"
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
    depends_on:
      - redis

  # ── 4. PostgreSQL DB ──────────────────────────────────────────
  # 로컬: 이 컨테이너 사용
  # AWS 전환 시: 이 서비스 제거 후 RDS 엔드포인트를 .env에 입력
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # ── 5. Redis (캐시 + 중복 로그인 차단) ──────────────────────────
  # 로컬: 이 컨테이너 사용
  # AWS 전환 시: 이 서비스 제거 후 ElastiCache 엔드포인트를 .env에 입력
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:
