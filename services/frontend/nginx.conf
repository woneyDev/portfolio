# 한 IP가 짧은 시간 안에 지나치게 많이 요청하는 것을 완화한다(초당 10건, 순간적으로는 20건까지 허용).
# 완전한 DDoS 차단은 아니지만, 반복적인 자동 요청으로 인한 부하는 여기서 상당수 걸러진다.
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

server {
    listen 80;
    location / {
        limit_req zone=general burst=20 nodelay;
        root   /usr/share/nginx/html;
        index  index.html;
        # 모든 요청을 index.html로 보내 React Router가 처리하게 함
        try_files $uri $uri/ /index.html;
    }
}