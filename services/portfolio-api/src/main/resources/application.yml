spring:
  application:
    name: portfolio-api

  # ── PostgreSQL 연결 (환경변수로 주입, 코드에 비밀번호 없음) ──
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/portfolio}
    username: ${SPRING_DATASOURCE_USERNAME:portfolio_user}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 3000
      idle-timeout: 600000

  # ── JPA 설정 ──
  jpa:
    hibernate:
      # 스키마 변경은 Flyway가 전담합니다 (docker-compose의 JPA_DDL_AUTO도 validate로 고정)
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── Flyway 스키마 마이그레이션 ──
  flyway:
    baseline-on-migrate: true
    baseline-version: 1
    placeholders:
      member1Username: ${MEMBER_ONE_USERNAME:woney}
      adminPassword: ${ADMIN_PASSWORD}

  # ── 이메일 발송 (회원가입 인증 메일) ──
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_APP_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

  # ── Redis 연결 (중복 로그인 차단 + 서비스 간 캐싱) ──
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      timeout: 3000ms

# ── 서버 설정 ──
server:
  port: ${SERVER_PORT:8080}

# ── 세션 만료 시간 (초 단위) ──
session:
  ttl-seconds: ${SESSION_TTL_SECONDS:3600}

# ── 관리 기능(로그인/마이페이지) 접속 허용 IP 목록 ──
# 쉼표로 구분해서 여러 개 등록 가능. 비워두면 로컬(localhost) 외에는 전부 차단됨.
security:
  admin-allowed-ips: ${ADMIN_ALLOWED_IPS:}

# ── 애플리케이션 설정 ──
app:
  # 인증 메일 링크에 사용할 프론트엔드 주소
  frontend-url: ${FRONTEND_URL:http://localhost:8080}

# ── 소셜 로그인 (클라이언트 ID/비밀키가 없으면 해당 제공자는 그냥 작동하지 않을 뿐, 앱 시작에는 영향 없음) ──
oauth:
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8081/api/auth/oauth/google/callback}
  kakao:
    client-id: ${KAKAO_CLIENT_ID:}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:8081/api/auth/oauth/kakao/callback}
  naver:
    client-id: ${NAVER_CLIENT_ID:}
    client-secret: ${NAVER_CLIENT_SECRET:}
    redirect-uri: ${NAVER_REDIRECT_URI:http://localhost:8081/api/auth/oauth/naver/callback}
