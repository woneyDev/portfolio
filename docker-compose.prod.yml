# 운영 서버(VPS) 전용 보정 설정.
# docker-compose.yml과 함께 사용: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# 로컬 개발용 docker-compose.yml은 그대로 두고, 운영 환경에서만 달라져야 하는 부분만 여기서 덮어쓴다.
services:

  # DB/Redis는 portfolio-api·data-service가 Docker 내부망(서비스명)으로만 접근하면 되고,
  # 외부(호스트/인터넷)에 포트를 열어줄 이유가 전혀 없다. 기존 설정(base 파일의 ports)을
  # !reset으로 완전히 비워서, 호스트에 아예 바인딩하지 않도록 한다(127.0.0.1 바인딩조차 안 함).
  postgres:
    ports: !reset []

  redis:
    ports: !reset []

  # 이 서버는 메모리가 매우 작아(약 500MB) JVM 기본 힙 크기로는 다른 컨테이너들과 함께 뜨기 빠듯하다.
  # 힙 상한을 명시적으로 낮게 고정해 메모리 부족으로 서버 전체가 멎는 것을 방지한다.
  portfolio-api:
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx220m -Xms96m

  # 우리가 직접 운영하는 서버라 nginx가 모든 경로를 index.html로 돌려보내줄 수 있다(nginx.conf의
  # try_files). 따라서 GitHub Pages와 달리 "#" 없는 깨끗한 주소(BrowserRouter)를 쓸 수 있다.
  # VITE_API_URL은 이 서버의 .env에서만 채워진다(값이 IP → 도메인으로 나중에 바뀔 것이라 여기엔
  # 하드코딩하지 않는다) — 로컬 .env.example에는 없으니 서버 .env에 직접 추가해서 쓴다.
  frontend:
    build:
      args:
        VITE_ROUTER_MODE: browser
        VITE_API_URL: ${VITE_API_URL}
